apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference base configuration
resources:
  - ../../base

  # Certificate infrastructure for mTLS (cluster-wide)
  - certificates/ca-certificate.yaml
  - certificates/ca-cluster-issuer.yaml
  - certificates/cmf-server-certificate.yaml
  - certificates/cmf-client-certificate.yaml
  - certificates/trust-bundle.yaml

# Strategic merge patches to enable mTLS
patches:
  - path: cmfrestclass-patch.yaml
    target:
      kind: CMFRestClass
      name: cmf-rest-class

  # Add cmf-mtls labels to namespaces for trust bundle distribution
  # Note: These namespaces are created by workloads/namespaces.yaml at cluster level
  - patch: |-
      - op: add
        path: /metadata/labels/cmf-mtls
        value: enabled
    target:
      kind: Namespace
      name: operator
  - patch: |-
      - op: add
        path: /metadata/labels/cmf-mtls
        value: enabled
    target:
      kind: Namespace
      name: flink

# Cluster-specific labels
labels:
- includeSelectors: false
  includeTemplates: true
  pairs:
    cluster: flink-demo-mtls
