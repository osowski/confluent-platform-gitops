---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cmf-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: cmf-root-ca
  secretName: cmf-root-ca
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  duration: 87600h # 10 years
  renewBefore: 720h # 30 days
