# FlinkEnvironment for shapes group
# RBAC: shapes group has DeveloperManage access to this environment
apiVersion: platform.confluent.io/v1beta1
kind: FlinkEnvironment
metadata:
  name: shapes-env
  namespace: flink-shapes
spec:
  kubernetesNamespace: flink-shapes

  # Reference to CMFRestClass in flink namespace (cross-namespace reference)
  cmfRestClassRef:
    name: cmf-rest-class
    namespace: flink

  # Default resource configuration for Flink applications
  flinkApplicationDefaults:
    spec:
      flinkConfiguration:
        taskmanager.numberOfTaskSlots: "2"
        metrics.reporter.prom.factory.class: "org.apache.flink.metrics.prometheus.PrometheusReporterFactory"
        metrics.reporter.prom.port: "9249-9250"
        rest.profiling.enabled: "true"

        # Schema Registry configuration for CMF table auto-discovery
        table.sql-catalog.confluent.schema-registry.url: "http://schemaregistry.kafka.svc.cluster.local:8081"

        # Schema Registry OAuth bearer authentication
        table.sql-catalog.confluent.schema-registry.bearer.auth.credentials.source: "OAUTHBEARER"
        table.sql-catalog.confluent.schema-registry.bearer.auth.token.endpoint.url: "http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token"
        table.sql-catalog.confluent.schema-registry.bearer.auth.client.id: "sa-shapes-flink"
        table.sql-catalog.confluent.schema-registry.bearer.auth.client.secret: "sa-shapes-flink-secret"
        #CC-specific settings
        #table.sql-catalog.confluent.schema-registry.bearer.auth.scope: ""
        #table.sql-catalog.confluent.schema-registry.bearer.auth.logical.cluster: ""
        #table.sql-catalog.confluent.schema-registry.bearer.auth.identity.pool.id: ""
