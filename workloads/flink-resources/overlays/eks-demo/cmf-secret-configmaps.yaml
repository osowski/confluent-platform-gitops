# ConfigMaps containing CMF Secret and EnvironmentSecretMapping definitions for Kafka
# These are applied via Jobs that call the CMF API
#
# NOTE: Schema Registry authentication is handled via STATIC_TOKEN in the catalog's
# connectionConfig, not via CMF Secrets. CMF 2.2 does not support OAUTHBEARER as a
# bearer.auth.credentials.source in its embedded SR client. The sql-init jobs obtain
# a fresh SR token from Keycloak at runtime and embed it in the catalog definition.
# See sql-init-jobs.yaml for the token generation logic.
---
# Kafka OAuth Secret for shapes group
# NOTE: Using cmf/cmf-secret credentials instead of sa-shapes-flink/sa-shapes-flink-secret
# because CMF's catalog registration process requires Kafka permissions that the environment-specific
# service accounts don't have. While sa-shapes-flink works for FlinkApplications, CMF needs broader
# permissions to validate database connections during catalog registration. This was confirmed by
# testing: cmf credentials work, environment-specific credentials fail with "Catalog could not be created".
# If switching to environment-specific credentials in the future, ensure they have equivalent Kafka ACLs
# to the cmf service account for CMF's validation process.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-oauth-secret-config
  namespace: flink-shapes
data:
  secret.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "Secret",
      "metadata": {
        "name": "kafka-oauth-secret-shapes"
      },
      "spec": {
        "data": {
          "security.protocol": "SASL_PLAINTEXT",
          "sasl.mechanism": "OAUTHBEARER",
          "sasl.oauthbearer.token.endpoint.url": "http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token",
          "sasl.login.callback.handler.class": "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler",
          "sasl.jaas.config": "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId='cmf' clientSecret='cmf-secret' scope='profile email';"
        }
      }
    }
---
# Kafka OAuth Secret for colors group
# NOTE: Using cmf/cmf-secret credentials (see comment above shapes-group for rationale)
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-oauth-secret-config
  namespace: flink-colors
data:
  secret.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "Secret",
      "metadata": {
        "name": "kafka-oauth-secret-colors"
      },
      "spec": {
        "data": {
          "security.protocol": "SASL_PLAINTEXT",
          "sasl.mechanism": "OAUTHBEARER",
          "sasl.oauthbearer.token.endpoint.url": "http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token",
          "sasl.login.callback.handler.class": "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler",
          "sasl.jaas.config": "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId='cmf' clientSecret='cmf-secret' scope='profile email';"
        }
      }
    }
---
# Shapes Environment Secret Mapping for Kafka
apiVersion: v1
kind: ConfigMap
metadata:
  name: shapes-secret-mapping-config
  namespace: flink-shapes
data:
  secret-mapping.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "EnvironmentSecretMapping",
      "metadata": {
        "name": "kafka-conn-secret-id-shapes"
      },
      "spec": {
        "secretName": "kafka-oauth-secret-shapes"
      }
    }
---
# Colors Environment Secret Mapping for Kafka
apiVersion: v1
kind: ConfigMap
metadata:
  name: colors-secret-mapping-config
  namespace: flink-colors
data:
  secret-mapping.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "EnvironmentSecretMapping",
      "metadata": {
        "name": "kafka-conn-secret-id-colors"
      },
      "spec": {
        "secretName": "kafka-oauth-secret-colors"
      }
    }
