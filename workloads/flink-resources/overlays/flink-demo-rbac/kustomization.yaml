apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference base configuration
resources:
  - ../../base
  - cfk-oauth-secret.yaml
  - keycloak-service-account-job.yaml
  - flink-oauth-secrets.yaml
  - flink-environment-shapes.yaml
  - flink-environment-colors.yaml
  - flink-application-shapes.yaml
  - flink-application-colors.yaml
  - sql-config-configmaps.yaml
  - cmf-secret-configmaps.yaml
  - catalog-init-job.yaml
  - sql-init-jobs.yaml
  - producer-oauth-secrets.yaml
  - producers.yaml

# Cluster-specific patches
patches:
  # Update CMFRestClass with OAuth authentication for operator
  - path: cmfrestclass-oauth-patch.yaml
    target:
      kind: CMFRestClass
      name: cmf-rest-class

# Cluster-specific labels
labels:
- includeSelectors: false
  includeTemplates: true
  pairs:
    cluster: flink-demo-rbac
