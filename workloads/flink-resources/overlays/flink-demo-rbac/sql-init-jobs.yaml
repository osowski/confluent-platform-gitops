# Jobs to initialize Flink SQL Catalogs, Databases, and ComputePools via CMF API
# These jobs run as ArgoCD PostSync hooks to create the resources after CMF is deployed
# BeforeHookCreation policy ensures old job instances are deleted before new ones are created
#
# IMPORTANT: Catalogs are built dynamically with a fresh STATIC_TOKEN for Schema Registry
# authentication. CMF 2.2 does not support OAUTHBEARER as a bearer.auth.credentials.source
# in its embedded SR client. Each ArgoCD sync generates a fresh token, ensuring the catalog
# always has valid SR credentials. See the README for token lifetime details.
---
# Shapes SQL Initialization Job
apiVersion: batch/v1
kind: Job
metadata:
  name: shapes-sql-init
  namespace: flink-shapes
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-cmf
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for CMF to be ready..."
              until nc -z cmf-service.operator.svc.cluster.local 80; do
                echo "CMF not ready yet, waiting..."
                sleep 5
              done
              echo "CMF is ready!"
        - name: wait-for-schema-registry
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Schema Registry to be ready..."
              until nc -z schemaregistry.kafka.svc.cluster.local 8081; do
                echo "Schema Registry not ready yet, waiting..."
                sleep 5
              done
              echo "Schema Registry is ready!"
        - name: wait-for-keycloak
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Keycloak to be ready..."
              until nc -z keycloak.keycloak.svc.cluster.local 8080; do
                echo "Keycloak not ready yet, waiting..."
                sleep 5
              done
              echo "Keycloak is ready!"
      containers:
        - name: sql-init
          image: curlimages/curl:8.1.2
          env:
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cmf-mds-oauth-client
                  key: clientId
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cmf-mds-oauth-client
                  key: clientSecret
            - name: SR_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: shapes-flink-oauth
                  key: client-id
            - name: SR_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shapes-flink-oauth
                  key: client-secret
          command:
            - /bin/sh
            - -c
            - |
              set -e

              CMF_URL="http://cmf-service.operator.svc.cluster.local:80/cmf/api/v1"
              KEYCLOAK_URL="http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token"

              echo "Obtaining CMF API OAuth token..."
              TOKEN_RESPONSE=$(curl -s -X POST ${KEYCLOAK_URL} \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=client_credentials" \
                -d "client_id=${OAUTH_CLIENT_ID}" \
                -d "client_secret=${OAUTH_CLIENT_SECRET}")

              ACCESS_TOKEN=$(echo ${TOKEN_RESPONSE} | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)

              if [ -z "${ACCESS_TOKEN}" ]; then
                echo "Failed to obtain CMF access token"
                echo "Response: ${TOKEN_RESPONSE}"
                exit 1
              fi

              echo "CMF API token obtained successfully"

              # Wait for FlinkEnvironment 'shapes-env' to be registered in CMF
              echo "Waiting for shapes-env to be registered in CMF..."
              ENV_WAIT_TIMEOUT=300
              ENV_WAIT_INTERVAL=10
              ENV_WAITED=0
              while true; do
                ENV_RESPONSE=$(curl --silent -w "\n%{http_code}" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -X GET ${CMF_URL}/environments/shapes-env)
                ENV_HTTP_CODE=$(echo "$ENV_RESPONSE" | tail -n1)
                if [ "$ENV_HTTP_CODE" = "200" ]; then
                  echo "  -> shapes-env is available in CMF"
                  break
                fi
                ENV_WAITED=$((ENV_WAITED + ENV_WAIT_INTERVAL))
                if [ "$ENV_WAITED" -ge "$ENV_WAIT_TIMEOUT" ]; then
                  echo "  -> ERROR: Timed out after ${ENV_WAIT_TIMEOUT}s waiting for shapes-env"
                  exit 1
                fi
                echo "  -> shapes-env not found (HTTP $ENV_HTTP_CODE), retrying in ${ENV_WAIT_INTERVAL}s... (${ENV_WAITED}/${ENV_WAIT_TIMEOUT}s)"
                sleep ${ENV_WAIT_INTERVAL}
              done

              echo "[1/6] Creating/updating CMF Secret: kafka-oauth-secret-shapes"
              RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -X POST ${CMF_URL}/secrets \
                -d @/config/secret/secret.json)
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "  -> Created: HTTP $HTTP_CODE"
              else
                echo "  -> Create returned HTTP $HTTP_CODE, attempting update..."
                RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -X PUT ${CMF_URL}/secrets/kafka-oauth-secret-shapes \
                  -d @/config/secret/secret.json)
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
                echo "  -> Update: HTTP $HTTP_CODE"
                if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                  echo "  -> Error: $RESPONSE_BODY"
                  exit 1
                fi
              fi

              echo "[2/6] Creating/updating secret mapping: kafka-conn-secret-id-shapes -> kafka-oauth-secret-shapes"
              RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -X POST ${CMF_URL}/environments/shapes-env/secret-mappings \
                -d @/config/secret-mapping/secret-mapping.json)
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "  -> Created: HTTP $HTTP_CODE"
              else
                echo "  -> Create returned HTTP $HTTP_CODE, attempting update..."
                RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -X PUT ${CMF_URL}/environments/shapes-env/secret-mappings/kafka-conn-secret-id-shapes \
                  -d @/config/secret-mapping/secret-mapping.json)
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
                echo "  -> Update: HTTP $HTTP_CODE"
                if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                  echo "  -> Error: $RESPONSE_BODY"
                  exit 1
                fi
              fi

              echo "[3/6] Obtaining SR STATIC_TOKEN for shapes-catalog..."
              SR_TOKEN_RESPONSE=$(curl -s -X POST ${KEYCLOAK_URL} \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=client_credentials" \
                -d "client_id=${SR_CLIENT_ID}" \
                -d "client_secret=${SR_CLIENT_SECRET}" \
                -d "scope=profile email")

              SR_TOKEN=$(echo ${SR_TOKEN_RESPONSE} | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)

              if [ -z "${SR_TOKEN}" ]; then
                echo "Failed to obtain SR token for shapes-catalog"
                echo "Response: ${SR_TOKEN_RESPONSE}"
                exit 1
              fi

              echo "  -> SR token obtained (will be embedded as STATIC_TOKEN in catalog)"

              echo "[4/6] Creating/updating KafkaCatalog: shapes-catalog (with STATIC_TOKEN)"
              CATALOG_JSON=$(cat <<CATALOG_EOF
              {
                "apiVersion": "cmf.confluent.io/v1",
                "kind": "KafkaCatalog",
                "metadata": { "name": "shapes-catalog" },
                "spec": {
                  "srInstance": {
                    "connectionConfig": {
                      "schema.registry.url": "http://schemaregistry.kafka.svc.cluster.local:8081",
                      "bearer.auth.credentials.source": "STATIC_TOKEN",
                      "bearer.auth.token": "${SR_TOKEN}"
                    }
                  }
                }
              }
              CATALOG_EOF
              )

              # Try to create the catalog; if it already exists, update it
              RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -X POST ${CMF_URL}/catalogs/kafka \
                -d "${CATALOG_JSON}")
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)

              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "  -> Created: HTTP $HTTP_CODE"
              else
                echo "  -> Create returned HTTP $HTTP_CODE, attempting update..."
                RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -X PUT ${CMF_URL}/catalogs/kafka/shapes-catalog \
                  -d "${CATALOG_JSON}")
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
                echo "  -> Update: HTTP $HTTP_CODE"
                if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                  echo "  -> Error: $RESPONSE_BODY"
                  exit 1
                fi
              fi

              echo "[5/6] Creating/updating KafkaDatabase: shapes-database in shapes-catalog"
              RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -X POST ${CMF_URL}/catalogs/kafka/shapes-catalog/databases \
                -d @/config/database/database.json)
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "  -> Created: HTTP $HTTP_CODE"
              else
                echo "  -> Create returned HTTP $HTTP_CODE, attempting update..."
                RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -X PUT ${CMF_URL}/catalogs/kafka/shapes-catalog/databases/shapes-database \
                  -d @/config/database/database.json)
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
                echo "  -> Update: HTTP $HTTP_CODE"
                if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                  echo "  -> Error: $RESPONSE_BODY"
                  exit 1
                fi
              fi

              echo "[6/6] Creating/updating ComputePool: shapes-pool in shapes-env"
              RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -X POST ${CMF_URL}/environments/shapes-env/compute-pools \
                -d @/config/pool/compute-pool.json)
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "  -> Created: HTTP $HTTP_CODE"
              else
                echo "  -> Create returned HTTP $HTTP_CODE, attempting update..."
                RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -X PUT ${CMF_URL}/environments/shapes-env/compute-pools/shapes-pool \
                  -d @/config/pool/compute-pool.json)
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
                echo "  -> Update: HTTP $HTTP_CODE"
                if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                  echo "  -> Error: $RESPONSE_BODY"
                  exit 1
                fi
              fi

              echo ""
              echo "Shapes environment initialization complete"
          volumeMounts:
            - name: database-config
              mountPath: /config/database
            - name: pool-config
              mountPath: /config/pool
            - name: secret-config
              mountPath: /config/secret
            - name: secret-mapping-config
              mountPath: /config/secret-mapping
      volumes:
        - name: database-config
          configMap:
            name: shapes-database-config
        - name: pool-config
          configMap:
            name: shapes-pool-config
        - name: secret-config
          configMap:
            name: kafka-oauth-secret-config
        - name: secret-mapping-config
          configMap:
            name: shapes-secret-mapping-config
---
