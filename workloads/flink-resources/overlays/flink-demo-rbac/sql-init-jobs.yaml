                RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -X PUT ${CMF_URL}/catalogs/kafka/colors-catalog/databases/colors-database \
                  -d @/config/database/database.json)
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
