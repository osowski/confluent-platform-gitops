              fi

              echo "[6/6] Creating/updating ComputePool: colors-pool in colors-env"
              RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -X POST ${CMF_URL}/environments/colors-env/compute-pools \
                -d @/config/pool/compute-pool.json)
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "  -> Created: HTTP $HTTP_CODE"
              else
                echo "  -> Create returned HTTP $HTTP_CODE, attempting update..."
                RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -X PUT ${CMF_URL}/environments/colors-env/compute-pools/colors-pool \
                  -d @/config/pool/compute-pool.json)
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
                echo "  -> Update: HTTP $HTTP_CODE"
                if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                  echo "  -> Error: $RESPONSE_BODY"
                  exit 1
                fi
              fi

              echo ""
              echo "Colors environment initialization complete"
          volumeMounts:
            - name: database-config
              mountPath: /config/database
            - name: pool-config
              mountPath: /config/pool
            - name: secret-config
              mountPath: /config/secret
            - name: secret-mapping-config
              mountPath: /config/secret-mapping
      volumes:
        - name: database-config
          configMap:
            name: colors-database-config
        - name: pool-config
          configMap:
            name: colors-pool-config
        - name: secret-config
          configMap:
            name: kafka-oauth-secret-config
        - name: secret-mapping-config
          configMap:
            name: colors-secret-mapping-config
