                sleep ${ENV_WAIT_INTERVAL}
              done

              echo "[1/6] Creating/updating CMF Secret: kafka-oauth-secret-colors"
              RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -X POST ${CMF_URL}/secrets \
                -d @/config/secret/secret.json)
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "  -> Created: HTTP $HTTP_CODE"
              else
                echo "  -> Create returned HTTP $HTTP_CODE, attempting update..."
                RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -X PUT ${CMF_URL}/secrets/kafka-oauth-secret-colors \
                  -d @/config/secret/secret.json)
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)
                echo "  -> Update: HTTP $HTTP_CODE"
                if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                  echo "  -> Error: $RESPONSE_BODY"
                  exit 1
                fi
              fi

              echo "[2/6] Creating/updating secret mapping: kafka-conn-secret-id-colors -> kafka-oauth-secret-colors"
              RESPONSE=$(curl --silent -w "\n%{http_code}" -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -X POST ${CMF_URL}/environments/colors-env/secret-mappings \
