              if [ -z "${SR_TOKEN}" ]; then
                echo "Failed to obtain SR token for colors-catalog"
                echo "Response: ${SR_TOKEN_RESPONSE}"
                exit 1
              fi

              echo "  -> SR token obtained (will be embedded as STATIC_TOKEN in catalog)"

              echo "[4/6] Creating/updating KafkaCatalog: colors-catalog (with STATIC_TOKEN)"
              CATALOG_JSON=$(cat <<CATALOG_EOF
              {
                "apiVersion": "cmf.confluent.io/v1",
                "kind": "KafkaCatalog",
                "metadata": { "name": "colors-catalog" },
                "spec": {
                  "srInstance": {
                    "connectionConfig": {
                      "schema.registry.url": "http://schemaregistry.kafka.svc.cluster.local:8081",
                      "bearer.auth.credentials.source": "STATIC_TOKEN",
                      "bearer.auth.token": "${SR_TOKEN}"
