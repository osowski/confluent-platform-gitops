# ConfigMaps containing CMF Secret and EnvironmentSecretMapping definitions
# These are applied via Jobs that call the CMF API
---
# Schema Registry OAuth Secret for shared kafka-cat catalog
# Used by both environments to access the catalog
# Copy in flink namespace for catalog-init-job
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-sr-oauth-secret-config
  namespace: flink
data:
  secret.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "Secret",
      "metadata": {
        "name": "sr-oauth-secret-catalog"
      },
      "spec": {
        "data": {
          "bearer.auth.credentials.source": "OAUTHBEARER",
          "bearer.auth.client.id": "cmf",
          "bearer.auth.client.secret": "cmf-secret",
          "bearer.auth.token.endpoint.url": "http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token"
        }
      }
    }
---
# Schema Registry OAuth Secret - Copy in flink-shapes namespace
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-sr-oauth-secret-config
  namespace: flink-shapes
data:
  secret.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "Secret",
      "metadata": {
        "name": "sr-oauth-secret-catalog"
      },
      "spec": {
        "data": {
          "bearer.auth.credentials.source": "OAUTHBEARER",
          "bearer.auth.client.id": "cmf",
          "bearer.auth.client.secret": "cmf-secret",
          "bearer.auth.token.endpoint.url": "http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token"
        }
      }
    }
---
# Catalog Secret Mapping for shapes-env
apiVersion: v1
kind: ConfigMap
metadata:
  name: shapes-catalog-secret-mapping-config
  namespace: flink-shapes
data:
  secret-mapping.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "EnvironmentSecretMapping",
      "metadata": {
        "name": "sr-oauth-secret-id-catalog"
      },
      "spec": {
        "secretName": "sr-oauth-secret-catalog"
      }
    }
---
# Catalog Secret Mapping for colors-env
apiVersion: v1
kind: ConfigMap
metadata:
  name: colors-catalog-secret-mapping-config
  namespace: flink-colors
data:
  secret-mapping.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "EnvironmentSecretMapping",
      "metadata": {
        "name": "sr-oauth-secret-id-catalog"
      },
      "spec": {
        "secretName": "sr-oauth-secret-catalog"
      }
    }
---
# Kafka OAuth Secret for shapes group
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-oauth-secret-config
  namespace: flink-shapes
data:
  secret.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "Secret",
      "metadata": {
        "name": "kafka-oauth-secret-shapes"
      },
      "spec": {
        "data": {
          "security.protocol": "SASL_PLAINTEXT",
          "sasl.mechanism": "OAUTHBEARER",
          "sasl.oauthbearer.token.endpoint.url": "http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token",
          "sasl.login.callback.handler.class": "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler",
          "sasl.jaas.config": "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId='cmf' clientSecret='cmf-secret' scope='profile email';"
        }
      }
    }
---
