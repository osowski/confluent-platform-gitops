          "sasl.login.callback.handler.class": "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler",
          "sasl.jaas.config": "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId='cmf' clientSecret='cmf-secret' scope='profile email';"
        }
      }
    }
---
# Shapes Environment Secret Mapping for Kafka (shapes-database access)
apiVersion: v1
kind: ConfigMap
metadata:
  name: shapes-secret-mapping-config
  namespace: flink-shapes
data:
  secret-mapping.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "EnvironmentSecretMapping",
      "metadata": {
        "name": "kafka-conn-secret-id-shapes"
      },
      "spec": {
        "secretName": "kafka-oauth-secret-shapes"
      }
    }
---
# Cross-environment Kafka Secret Mapping for colors-database in shapes-env
# Allows shapes-env to load kafka-cat catalog (which contains colors-database)
