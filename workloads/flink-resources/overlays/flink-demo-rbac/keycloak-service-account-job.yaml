---
# Job to create Keycloak OAuth service accounts for Flink applications
# Creates sa-shapes-flink and sa-colors-flink clients via Keycloak Admin REST API
# Runs during ArgoCD sync before FlinkApplications are deployed
# Uses reflected keycloak-admin secret in flink namespace
apiVersion: batch/v1
kind: Job
metadata:
  name: flink-service-account-setup
  namespace: flink
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  # Keep job history for debugging
  ttlSecondsAfterFinished: 86400  # 24 hours
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: flink-service-account-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: curlimages/curl:8.1.2
          env:
            # Keycloak configuration
            - name: KEYCLOAK_URL
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
            - name: REALM
              value: "confluent"
            # Admin credentials from existing keycloak-admin secret
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN
            - name: ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "========================================="
              echo "Keycloak Service Account Setup"
              echo "========================================="
              echo ""
              echo "Configuration:"
              echo "  Keycloak URL: ${KEYCLOAK_URL}"
              echo "  Realm: ${REALM}"
              echo "  Admin User: ${ADMIN_USER}"
              echo ""

              # Function to get admin token
              get_admin_token() {
                local response
                response=$(curl -s -X POST "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
                  -d "client_id=admin-cli" \
                  -d "username=${ADMIN_USER}" \
                  -d "password=${ADMIN_PASS}" \
                  -d "grant_type=password")

                local token
                token=$(echo "$response" | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)

                if [ -z "$token" ]; then
                  echo "ERROR: Failed to obtain admin token"
                  echo "Response: $response"
                  return 1
                fi

                echo "$token"
              }

              # Function to create service account
              create_service_account() {
                local CLIENT_ID=$1
                local GROUP_NAME=$2
                local TOKEN=$3

                echo "Creating service account: ${CLIENT_ID}"

                # Check if client already exists
                local existing_client
                existing_client=$(curl -s -X GET "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=${CLIENT_ID}" \
                  -H "Authorization: Bearer ${TOKEN}")

                local client_count
                client_count=$(echo "$existing_client" | grep -o '"id"' | wc -l)

                if [ "$client_count" -gt 0 ]; then
                  echo "  Client already exists, updating configuration..."
                  local client_uuid
                  client_uuid=$(echo "$existing_client" | grep -o '"id":"[^"]*' | head -n1 | cut -d'"' -f4)
                else
                  # Create client
                  echo "  Creating new client..."
                  curl -s -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/clients" \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d '{
                      "clientId": "'${CLIENT_ID}'",
                      "enabled": true,
                      "clientAuthenticatorType": "client-secret",
                      "secret": "'${CLIENT_ID}'-secret",
                      "serviceAccountsEnabled": true,
                      "standardFlowEnabled": false,
                      "directAccessGrantsEnabled": false,
                      "publicClient": false,
                      "protocol": "openid-connect"
                    }' > /dev/null

                  # Get client UUID
                  local client_uuid
                  client_uuid=$(curl -s -X GET "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=${CLIENT_ID}" \
                    -H "Authorization: Bearer ${TOKEN}" | grep -o '"id":"[^"]*' | head -n1 | cut -d'"' -f4)

                  if [ -z "$client_uuid" ]; then
                    echo "ERROR: Failed to create client ${CLIENT_ID}"
                    return 1
                  fi
                fi

                # Get group UUID
                echo "  Looking up group: ${GROUP_NAME}..."
                local group_uuid
                group_uuid=$(curl -s -X GET "${KEYCLOAK_URL}/admin/realms/${REALM}/groups?search=${GROUP_NAME}" \
                  -H "Authorization: Bearer ${TOKEN}" | grep -o '"id":"[^"]*' | head -n1 | cut -d'"' -f4)

                if [ -z "$group_uuid" ]; then
                  echo "ERROR: Group '${GROUP_NAME}' not found"
                  return 1
                fi

                # Get service account user UUID
                echo "  Getting service account user..."
                local sa_user_uuid
                sa_user_uuid=$(curl -s -X GET "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${client_uuid}/service-account-user" \
                  -H "Authorization: Bearer ${TOKEN}" | grep -o '"id":"[^"]*' | head -n1 | cut -d'"' -f4)

                if [ -z "$sa_user_uuid" ]; then
                  echo "ERROR: Failed to get service account user for ${CLIENT_ID}"
                  return 1
                fi

                # Add service account user to group
                echo "  Adding to group '${GROUP_NAME}'..."
                curl -s -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/users/${sa_user_uuid}/groups/${group_uuid}" \
                  -H "Authorization: Bearer ${TOKEN}" > /dev/null

                # Get existing protocol mappers
                local existing_mappers
                existing_mappers=$(curl -s -X GET "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${client_uuid}/protocol-mappers/models" \
                  -H "Authorization: Bearer ${TOKEN}")

                # Add email mapper if not exists
                if ! echo "$existing_mappers" | grep -q '"name":"email"'; then
                  echo "  Adding email protocol mapper..."
                  curl -s -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${client_uuid}/protocol-mappers/models" \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d '{
                      "name": "email",
                      "protocol": "openid-connect",
                      "protocolMapper": "oidc-usermodel-property-mapper",
                      "config": {
                        "user.attribute": "email",
                        "claim.name": "email",
                        "jsonType.label": "String",
                        "id.token.claim": "true",
                        "access.token.claim": "true",
                        "userinfo.token.claim": "true"
                      }
                    }' > /dev/null
                fi

                # Add groups mapper if not exists
                if ! echo "$existing_mappers" | grep -q '"name":"groups"'; then
                  echo "  Adding groups protocol mapper..."
                  curl -s -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${client_uuid}/protocol-mappers/models" \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d '{
                      "name": "groups",
                      "protocol": "openid-connect",
                      "protocolMapper": "oidc-group-membership-mapper",
                      "config": {
                        "claim.name": "groups",
                        "full.path": "false",
                        "id.token.claim": "true",
                        "access.token.claim": "true",
                        "userinfo.token.claim": "true"
                      }
                    }' > /dev/null
                fi

                # Add client_id mapper if not exists
                if ! echo "$existing_mappers" | grep -q '"name":"client_id"'; then
                  echo "  Adding client_id protocol mapper..."
                  curl -s -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${client_uuid}/protocol-mappers/models" \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d '{
                      "name": "client_id",
                      "protocol": "openid-connect",
                      "protocolMapper": "oidc-usersessionmodel-note-mapper",
                      "config": {
                        "user.session.note": "client_id",
                        "claim.name": "client_id",
                        "jsonType.label": "String",
                        "id.token.claim": "true",
                        "access.token.claim": "true"
                      }
                    }' > /dev/null
                fi

                echo "  ✅ Successfully configured ${CLIENT_ID}"
              }

              # Function to verify service account
              verify_service_account() {
                local CLIENT_ID=$1
                local CLIENT_SECRET="${CLIENT_ID}-secret"

                echo "Verifying ${CLIENT_ID}..."

                local token_response
                token_response=$(curl -s -X POST "${KEYCLOAK_URL}/realms/${REALM}/protocol/openid-connect/token" \
                  -d "grant_type=client_credentials" \
                  -d "client_id=${CLIENT_ID}" \
                  -d "client_secret=${CLIENT_SECRET}")

                local access_token
                access_token=$(echo "$token_response" | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)

                if [ -z "$access_token" ]; then
                  echo "  ERROR: Failed to obtain token"
                  return 1
                fi

                echo "  ✅ Token generation successful"
                return 0
              }

              # Main execution
              echo "Obtaining admin token..."
              ADMIN_TOKEN=$(get_admin_token)

              if [ -z "${ADMIN_TOKEN}" ]; then
                echo "ERROR: Failed to obtain admin token"
                exit 1
              fi

              echo "Admin token obtained successfully"
              echo ""

              # Create service accounts
              create_service_account "sa-shapes-flink" "shapes" "${ADMIN_TOKEN}"
              echo ""
              create_service_account "sa-colors-flink" "colors" "${ADMIN_TOKEN}"
              echo ""

              # Verify service accounts
              echo "========================================="
              echo "Verifying Service Accounts"
              echo "========================================="
              echo ""

              verify_service_account "sa-shapes-flink"
              echo ""
              verify_service_account "sa-colors-flink"
              echo ""

              # Summary
              echo "========================================="
              echo "Setup Complete"
              echo "========================================="
              echo ""
              echo "Service accounts created and verified:"
              echo "  - sa-shapes-flink (secret: sa-shapes-flink-secret)"
              echo "  - sa-colors-flink (secret: sa-colors-flink-secret)"
              echo ""
              echo "Ready for FlinkApplication deployment"
              echo ""
