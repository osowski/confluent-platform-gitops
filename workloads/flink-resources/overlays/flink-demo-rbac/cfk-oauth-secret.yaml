# OAuth Secret for CFK Operator to CMF Authentication
# This secret contains the OAuth token that CFK uses when making REST calls to CMF
# This is operator-level authentication, not end-user authentication
---
apiVersion: v1
kind: Secret
metadata:
  name: cfk-cmf-oauth-token
  namespace: flink
type: Opaque
stringData:
  # Bearer token for CFK operator
  # In production, this should be obtained from the OAuth provider (Keycloak)
  # For now, using client credentials flow with cmf client
  #
  # To obtain a token manually:
  # TOKEN=$(curl -X POST http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token \
  #   -H "Content-Type: application/x-www-form-urlencoded" \
  #   -d "grant_type=client_credentials" \
  #   -d "client_id=cmf" \
  #   -d "client_secret=cmf-secret" | jq -r '.access_token')
  #
  # Note: Bearer tokens expire. For production, consider using client credentials
  # in the secret and having CFK/CMF handle token refresh.
  #
  # Alternative approach: Store client credentials and let CFK obtain tokens
  bearer-token: "PLACEHOLDER_TOKEN"

  # Client credentials approach (if supported by CFK):
  client-id: "cmf"
  client-secret: "cmf-secret"
