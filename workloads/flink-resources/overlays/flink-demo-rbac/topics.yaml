# KafkaTopic resources for group-based RBAC demonstration
# Topics follow naming convention: <group>-* for RBAC enforcement
# Deployed in application-specific namespaces with cross-namespace KafkaRestClass reference
---
# Shapes group topics
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: shapes-input
  namespace: flink-shapes
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
    retention.ms: "172800000"  # 2 days
  kafkaRestClassRef:
    name: default
    namespace: kafka
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: shapes-output
  namespace: flink-shapes
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
    retention.ms: "172800000"  # 2 days
  kafkaRestClassRef:
    name: default
    namespace: kafka
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: shapes-state
  namespace: flink-shapes
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "compact"
    min.compaction.lag.ms: "0"
  kafkaRestClassRef:
    name: default
    namespace: kafka
---
# Colors group topics
