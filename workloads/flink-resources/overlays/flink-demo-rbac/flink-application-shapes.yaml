# FlinkApplication for shapes group - Kafka-connected with OAuth
# Deployed in flink-shapes namespace, accessible only to shapes group members
apiVersion: platform.confluent.io/v1beta1
kind: FlinkApplication
metadata:
  name: shapes
  namespace: flink-shapes
spec:
  # Reference to FlinkEnvironment
  flinkEnvironment: shapes-env

  # Reference to CMFRestClass for CMF communication
  cmfRestClassRef:
    name: cmf-rest-class
    namespace: flink

  # Flink version
  flinkVersion: v2_1

  # Flink Docker image with bundled application JAR
  # Updated to include Flink configuration property support for OAuth/SASL
  image: quay.io/osowski/flink-kafka-demo:2.1.1-202603241000

  # ServiceAccount for Kubernetes RBAC
  serviceAccount: flink

  # JobManager configuration
  jobManager:
    replicas: 1
    resource:
      memory: "1048m"
      cpu: 1

  # TaskManager configuration
  taskManager:
    resource:
      memory: "1048m"
      cpu: 1
    replicas: 2

  # OAuth credentials injection
  # Inject OAuth client credentials from Kubernetes Secret into pod environment
  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: ENABLE_BUILT_IN_PLUGINS
              value: "flink-s3-fs-hadoop-2.1.1-cp1.jar"
            # OAuth client ID from secret
            - name: KAFKA_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: shapes-flink-oauth
                  key: client-id
            # OAuth client secret from secret
            - name: KAFKA_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shapes-flink-oauth
                  key: client-secret
            # Kafka topic configuration for application
            - name: KAFKA_TOPIC
              value: shapes-input
            - name: KAFKA_OUTPUT_TOPIC
              value: shapes-output
            # S3 credentials from reflected secret
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password

  # Flink configuration - Kafka OAuth Authentication
  flinkConfiguration:
    # Kafka bootstrap servers (internal SASL_PLAINTEXT listener)
    # Port 9071 is the internal listener with OAuth enabled
    kafka.bootstrap.servers: kafka.kafka.svc.cluster.local:9071

    # Kafka security configuration
    kafka.security.protocol: SASL_PLAINTEXT
    kafka.sasl.mechanism: OAUTHBEARER

    # JAAS configuration for OAuth authentication
    # Hardcoded credentials for demo environment (service account created by Keycloak job)
    kafka.sasl.jaas.config: |
      org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required
      clientId="sa-shapes-flink"
      clientSecret="sa-shapes-flink-secret"
      tokenEndpointUri="http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token";

    # OAuth callback handler
    kafka.sasl.login.callback.handler.class: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler

    # OAuth token endpoint URL (required for OAuth callback handler)
    kafka.sasl.oauthbearer.token.endpoint.url: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token

    # Consumer configuration
    kafka.consumer.group.id: shapes-autoscaler
    kafka.consumer.auto.offset.reset: earliest

    # Producer configuration
    kafka.producer.transaction.timeout.ms: "900000"

    # Application-specific topic configuration
    kafka.input.topic: shapes-input
    kafka.output.topic: shapes-output

    # Flink autoscaling configuration (disabled for this demo environment)
    kubernetes.operator.job.autoscaler.enabled: "false"

    # Flink task slots
    taskmanager.numberOfTaskSlots: "2"

    # Restart strategy for fault tolerance
    # fixed-delay will restart the job a fixed number of times with a delay between attempts
    restart-strategy.type: fixed-delay
    restart-strategy.fixed-delay.attempts: "3"
    restart-strategy.fixed-delay.delay: "10s"

    # Prometheus metrics
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: "9249-9250"

    # Checkpointing configuration
    execution.checkpointing.interval: "10s"
    execution.checkpointing.mode: EXACTLY_ONCE
    execution.checkpointing.min-pause: "5s"
    execution.checkpointing.max-concurrent-checkpoints: "1"
    execution.checkpointing.timeout: "600000"

    # State backend configuration
    state.backend: hashmap
    state.checkpoints.dir: "s3://warehouse/checkpoints/shapes"
    state.savepoints.dir: "s3://warehouse/savepoints/shapes"
    state.checkpoints.num-retained: "10"

    # S3 configuration (points to MinIO service)
    s3.endpoint: "http://minio.flink.svc.cluster.local:9000"
    s3.path.style.access: "true"
    s3.connection.ssl.enabled: "false"

    # High availability configuration
    high-availability.type: kubernetes
    high-availability.storageDir: "s3://warehouse/ha/shapes"

  # Job configuration
  job:
    # JAR location (bundled in container image)
    jarURI: local:///opt/flink/usrlib/kafka-flink-job.jar

    # Parallelism
    parallelism: 2

    # Upgrade mode (stateful with checkpointing)
    # stateless for first deployment
    # last-state to recover from previous state
    upgradeMode: stateless

    # Job state
    state: running

    # Application arguments
    args: []
