# FlinkEnvironment CR for env1
# This declarative resource replaces the imperative environment creation
# previously done in the compute pool Job
apiVersion: platform.confluent.io/v1beta1
kind: FlinkEnvironment
metadata:
  name: env1
  namespace: flink
spec:
  kubernetesNamespace: flink

  # Reference to CMFRestClass for CMF communication
  cmfRestClassRef:
    name: cmf-rest-class
    namespace: flink

  # Default resource configuration for Flink jobs
  flinkApplicationDefaults:
    #metadata:
    #  labels:
    #     "owned-by": "team-name"
    spec:
      flinkConfiguration:
        # JobManager configuration
        #jobmanager.memory.process.size: "1024m"
        #jobmanager.cpu: "1.0"

        # TaskManager configuration
        #taskmanager.memory.process.size: "1024m"
        #taskmanager.cpu: "1.0"
        #taskmanager.numberOfTaskSlots: "2"

        metrics.reporter.prom.factory.class: "org.apache.flink.metrics.prometheus.PrometheusReporterFactory"
        metrics.reporter.prom.port: "9249-9250"
        rest.profiling.enabled: "true"
