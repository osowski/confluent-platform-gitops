---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: keycloak
spec:
  template:
    spec:
      containers:
      - name: keycloak
        env:
        - name: KC_HOSTNAME
          value: https://keycloak.flink-demo-rbac-mtls.confluentdemo.local
        - name: KC_HOSTNAME_ADMIN
          value: https://keycloak.flink-demo-rbac-mtls.confluentdemo.local
        - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
          value: "true"
