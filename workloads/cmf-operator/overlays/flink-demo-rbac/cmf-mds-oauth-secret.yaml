# OAuth Client Secret for CMF to authenticate with MDS
# This secret must be in the operator namespace where CMF is deployed
# Also used by Flink SQL initialization Jobs
# Mirrored to flink-shapes and flink-colors namespaces via Reflector
---
apiVersion: v1
kind: Secret
metadata:
  name: cmf-mds-oauth-client
  namespace: operator
  annotations:
    # Reflector annotations to mirror secret to Flink namespaces for SQL init Jobs
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "flink,flink-shapes,flink-colors"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
type: Opaque
stringData:
  # Client ID for CMF (matches Keycloak client)
  clientId: cmf
  # Client secret from Keycloak realm configuration
  # WARNING: This is a DEMO-ONLY secret that matches the Keycloak realm config
  # For production, rotate this secret and use external secret management
  clientSecret: cmf-secret
