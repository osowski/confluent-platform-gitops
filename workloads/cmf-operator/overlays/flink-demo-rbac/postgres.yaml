---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cmf-postgres-pvc
  namespace: operator
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmf-postgres
  namespace: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmf-postgres
  template:
    metadata:
      labels:
        app: cmf-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        envFrom:
        - secretRef:
            name: cmf-postgres-credentials
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - cmf
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - cmf
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: cmf-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cmf-postgres
  namespace: operator
spec:
  selector:
    app: cmf-postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  type: ClusterIP
