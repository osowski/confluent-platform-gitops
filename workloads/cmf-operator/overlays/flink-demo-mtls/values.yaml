# Confluent Manager for Apache Flink - flink-demo Cluster Overlay
# Cluster-specific configuration overrides

# Additional pod annotations for flink-demo cluster identification
podAnnotations:
  cluster: flink-demo

# Enable mTLS authentication
cmf:
  authentication:
    type: mtls

# Mount server certificates for mTLS
mountedVolumes:
  volumes:
    - name: cmf-server-tls
      secret:
        secretName: cmf-server-tls
        defaultMode: 0440
  volumeMounts:
    - name: cmf-server-tls
      mountPath: /etc/cmf/tls
      readOnly: true
