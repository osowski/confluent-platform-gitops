---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: myevent
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 3
  partitionCount: 1
  kafkaRestClassRef:
    name: default
    namespace: kafka
  configs:
    cleanup.policy: "delete"
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: myaggregated
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 3
  partitionCount: 1
  kafkaRestClassRef:
    name: default
    namespace: kafka
  configs:
    cleanup.policy: "delete"
