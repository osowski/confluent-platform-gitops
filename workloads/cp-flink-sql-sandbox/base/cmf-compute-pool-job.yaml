---
apiVersion: batch/v1
kind: Job
metadata:
  name: cmf-compute-pool-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    metadata:
      name: cmf-compute-pool-init
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-cmf
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for CMF to be ready..."
          until nc -z cmf-service.operator.svc.cluster.local 80; do
            echo "CMF not ready yet, waiting..."
            sleep 5
          done
          echo "CMF is ready!"
      - name: wait-for-minio
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for MinIO to be ready..."
          until nc -z minio.storage.svc.cluster.local 9000; do
            echo "MinIO not ready yet, waiting..."
            sleep 5
          done
          echo "MinIO is ready!"
      containers:
      - name: create-compute-pool
        image: confluentinc/confluent-cli:4.53.0
        env:
        - name: CMF_URL
          value: "http://cmf-service.operator.svc.cluster.local:80"
        volumeMounts:
        - name: compute-pool-config
          mountPath: /config
        command:
        - /bin/sh
        - -c
        - |
          set -e

          # FlinkEnvironment "env1" is now managed declaratively via FlinkEnvironment CR
          # in workloads/flink-resources/base/flink-environment-env1.yaml

          echo "Creating Flink compute pool..."
          confluent flink compute-pool create /config/compute-pool.json --environment env1 --url ${CMF_URL} || echo "Compute pool may already exist"

          echo "Listing compute pools..."
          confluent flink compute-pool list --environment env1 --url ${CMF_URL}

          echo "Compute pool initialization complete!"
      volumes:
      - name: compute-pool-config
        configMap:
          name: cmf-compute-pool-config
