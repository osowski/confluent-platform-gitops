---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "25"
  labels:
    app: minio
spec:
  routes:
    - match: Host(`s3.CLUSTER_NAME.DOMAIN`)
      kind: Rule
      services:
        - name: minio
          port: 9000
          scheme: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-console
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "25"
  labels:
    app: minio
spec:
  routes:
    - match: Host(`s3-console.CLUSTER_NAME.DOMAIN`)
      kind: Rule
      services:
        - name: minio
          port: 9001
          scheme: http
