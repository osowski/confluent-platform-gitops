# ==============================================================================
# Schema Registry Configuration for flink-demo-rbac-mtls Cluster
# ==============================================================================
# This patch consolidates all Schema Registry configuration including:
# - Resource limits for local demo environment
# - HTTPS on the SR REST API (spec.tls, #275)
# - OAuth authentication to Kafka and MDS (RBAC identity)
# - RBAC authorization
# NOTE: SR authenticates to Kafka via OAuth, not a client cert — cert-principal
# auth for a component is not supported in CFK RBAC mode (the component identity
# is carried by the OAuth/MDS token). SR still serves its own API over HTTPS.
# ==============================================================================
apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: kafka
spec:
  # ==============================================================================
  # TLS - SR serves its REST API over HTTPS using the cert-manager cert (CN=sr).
  # ==============================================================================
  tls:
    secretRef: schemaregistry-mtls

  # ==============================================================================
  # RESOURCE LIMITS - Tuned for 24GB total cluster memory
  # ==============================================================================
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # ==============================================================================
  # AUTHORIZATION - RBAC
  # ==============================================================================
  authorization:
    type: rbac

  # ==============================================================================
  # DEPENDENCIES - Kafka and MDS with OAuth authentication
  # ==============================================================================
  dependencies:
    # Kafka connection with OAuth authentication (internal listener)
    kafka:
      bootstrapEndpoint: kafka.kafka.svc.cluster.local:9071
      authentication:
        type: oauth
        jaasConfig:
          secretRef: kafka-oauth-client
        oauthSettings:
          subClaimName: client_id
          tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token

    # MDS connection with OAuth authentication
    mds:
      endpoint: http://kafka.kafka.svc.cluster.local:8090
      tokenKeyPair:
        secretRef: mds-token
      authentication:
        type: oauth
        oauth:
          secretRef: kafka-oauth-client
          configuration:
            tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
            expectedIssuer: https://keycloak.flink-demo-rbac-mtls.confluentdemo.local/realms/confluent
            jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
            subClaimName: client_id
