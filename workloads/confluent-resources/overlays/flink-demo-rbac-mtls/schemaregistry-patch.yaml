# ==============================================================================
# Schema Registry Configuration for flink-demo-rbac-mtls Cluster
# ==============================================================================
# This patch consolidates all Schema Registry configuration including:
# - Resource limits for local demo environment
# - mTLS authentication to Kafka via the dedicated mtls-clients listener (#275)
# - HTTPS on the SR REST API (spec.tls)
# - OAuth authentication to MDS (RBAC identity)
# - RBAC authorization
# ==============================================================================
apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: kafka
spec:
  # ==============================================================================
  # TLS - SR identity from cert-manager (CN=sr): serves the REST API over HTTPS
  # and is presented as the client cert for Kafka mTLS.
  # ==============================================================================
  tls:
    secretRef: schemaregistry-mtls

  # ==============================================================================
  # RESOURCE LIMITS - Tuned for 24GB total cluster memory
  # ==============================================================================
  podTemplate:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # ==============================================================================
  # AUTHORIZATION - RBAC
  # ==============================================================================
  authorization:
    type: rbac

  # ==============================================================================
  # DEPENDENCIES - Kafka and MDS with OAuth authentication
  # ==============================================================================
  dependencies:
    # Kafka connection over the dedicated mtls-clients listener: SR presents
    # its spec.tls cert (CN=sr -> User:sr) instead of an OAuth token.
    kafka:
      bootstrapEndpoint: kafka.kafka.svc.cluster.local:9095
      authentication:
        type: mtls
      tls:
        enabled: true

    # MDS connection with OAuth authentication
    mds:
      endpoint: http://kafka.kafka.svc.cluster.local:8090
      tokenKeyPair:
        secretRef: mds-token
      authentication:
        type: oauth
        oauth:
          secretRef: kafka-oauth-client
          configuration:
            tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
            expectedIssuer: https://keycloak.flink-demo-rbac-mtls.confluentdemo.local/realms/confluent
            jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
            subClaimName: client_id
