# ==============================================================================
# KRaft Controller Configuration for flink-demo-rbac-mtls Cluster
# ==============================================================================
# This patch consolidates all KRaft controller configuration including:
# - Resource limits for local demo environment
# - TLS + mTLS authentication for controller quorum communication (Phase 1, #273)
# - Server identity certificate from cert-manager (kraftcontroller-mtls)
# NOTE: Authorization intentionally omitted to avoid circular dependency with Kafka MDS.
#       Controllers are an internal control plane — principals connecting to them (kafka brokers)
#       are already super users. Fine-grained RBAC adds no practical security benefit here.
# ==============================================================================
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: kafka
spec:
  # ==============================================================================
  # RESOURCE LIMITS - Tuned for 24GB total cluster memory
  # ==============================================================================
  podTemplate:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  # ==============================================================================
  # CONTROLLER LISTENER - TLS + mTLS authentication for quorum communication
  # Cert CN=kafka maps to User:kafka (existing superuser). The controller has no
  # authorizer (see NOTE above), so any CA-trusted authenticated peer is accepted.
  # ==============================================================================
  listeners:
    controller:
      tls:
        enabled: true
      authentication:
        type: mtls
        principalMappingRules:
          - "RULE:.*CN[\\s]?=[\\s]?([a-zA-Z0-9.]*)?.*/$1/"
        mtls:
          # Mandatory client-cert auth (reject anonymous). The controller has no
          # authorizer, so enforcing cert presentation is the access boundary.
          sslClientAuthentication: required

  # ==============================================================================
  # SERVER TLS - controller identity from cert-manager (CFK TLS Group 3 keys)
  # ==============================================================================
  tls:
    secretRef: kraftcontroller-mtls
