---
# KRaft controller server/identity cert for the controller (quorum) listener.
# CN=kafka maps to User:kafka via the listener's principalMappingRules.
# SANs cover the headless pod DNS CFK uses for controller-to-controller and
# broker-to-controller connections.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kraftcontroller-mtls
  namespace: kafka
  annotations:
    # Issue before the Confluent CRs (KRaftController is wave 0) so spec.tls
    # secretRef targets exist when CFK reconciles the components.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  commonName: kafka
  secretName: kraftcontroller-mtls
  duration: 2160h     # 90 days
  # Staggered from kafka-broker-mtls (720h) so controller and broker renewals
  # do not trigger concurrent CFK rolls across both clusters.
  renewBefore: 696h
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
    - kraftcontroller.kafka.svc.cluster.local
    - "*.kraftcontroller.kafka.svc.cluster.local"
    - kafka.kafka.svc.cluster.local
    - "*.kafka.svc.cluster.local"
  issuerRef:
    name: rbac-mtls-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - digital signature
    - key encipherment
    - server auth
    - client auth
---
# Kafka broker server/identity cert. Used both to serve TLS and as the client
# identity when brokers connect to the KRaft controller over mTLS.
# CN=kafka maps to User:kafka (existing RBAC superuser).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kafka-broker-mtls
  namespace: kafka
  annotations:
    # Issue before the Confluent CRs (KRaftController is wave 0) so spec.tls
    # secretRef targets exist when CFK reconciles the components.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  commonName: kafka
  secretName: kafka-broker-mtls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
    - kafka.kafka.svc.cluster.local
    - "*.kafka.kafka.svc.cluster.local"
    - "*.kafka.svc.cluster.local"
    - kraftcontroller.kafka.svc.cluster.local
    - "*.kraftcontroller.kafka.svc.cluster.local"
  issuerRef:
    name: rbac-mtls-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - digital signature
    - key encipherment
    - server auth
    - client auth
---
# Schema Registry identity cert: serves the SR HTTPS API and acts as the
# client cert for SR -> Kafka mTLS on the mtls-clients listener (#275).
# CN=sr maps to User:sr (see confluentrolebindings.yaml).
# renewBefore staggered from the broker/controller certs so renewals do not
# trigger concurrent rolls across components.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: schemaregistry-mtls
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  commonName: sr
  secretName: schemaregistry-mtls
  duration: 2160h
  renewBefore: 672h
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
    - schemaregistry.kafka.svc.cluster.local
    - "*.schemaregistry.kafka.svc.cluster.local"
  issuerRef:
    name: rbac-mtls-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - digital signature
    - key encipherment
    - server auth
    - client auth
---
# Control Center identity cert (CN=c3, #275): currently used only as the
# truststore source for C3 -> Schema Registry HTTPS (dependency-level tls
# secretRef, so C3's own UI stays behind the Traefik edge); also positions C3
# for a future migration to cert-based Kafka authentication.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: controlcenter-mtls
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  commonName: c3
  secretName: controlcenter-mtls
  duration: 2160h
  renewBefore: 648h
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
    - controlcenter.kafka.svc.cluster.local
    - "*.controlcenter.kafka.svc.cluster.local"
  issuerRef:
    name: rbac-mtls-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - digital signature
    - key encipherment
    - server auth
    - client auth
