# ==============================================================================
# Kafka Broker Configuration for flink-demo-rbac Cluster
# ==============================================================================
# This patch consolidates all Kafka broker configuration including:
# - External NodePort listener configuration
# - Resource limits for local demo environment
# - MDS/RBAC configuration with OAuth provider (Keycloak)
# - SSO/OIDC configuration for browser-based authentication (Control Center)
# - Broker-to-KRaft controller OAuth authentication
# - Internal listener OAuth authentication
# ==============================================================================
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: kafka
spec:
  # ==============================================================================
  # EXTERNAL LISTENER - NodePort for kind cluster access
  # ==============================================================================
  # Enables external access via kind's port mapping:
  # - kind extraMappings: 31000-31002:31000-31002 (for 3 brokers)
  # - Bootstrap connection: kafka.flink-demo-rbac.confluentdemo.local:31000
  # - Requires /etc/hosts entry: 127.0.0.1 kafka.flink-demo-rbac.confluentdemo.local
  listeners:
    custom:
      - name: external-nodeport
        port: 9094
        externalAccess:
          type: nodePort
          nodePort:
            host: kafka.flink-demo-rbac.confluentdemo.local
            nodePortOffset: 31000
        tls:
          enabled: false

    # ==============================================================================
    # INTERNAL LISTENER - OAuth authentication for inter-broker communication
    # ==============================================================================
    internal:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: kafka-oauth-client
        oauthSettings:
          tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
          expectedIssuer: http://keycloak.flink-demo-rbac.confluentdemo.local:8080/realms/confluent
          jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
          subClaimName: client_id

  # ==============================================================================
  # RESOURCE LIMITS - Tuned for 24GB total cluster memory
  # ==============================================================================
  podTemplate:
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

  # ==============================================================================
  # AUTHORIZATION - RBAC with super users
  # ==============================================================================
  authorization:
    type: rbac
    superUsers:
      - User:admin@osow.ski
      - User:kafka
      - User:cmf

  # ==============================================================================
  # MDS (METADATA SERVICE) - RBAC and SSO/OIDC configuration
  # ==============================================================================
  services:
    mds:
      # Token key pair for signing MDS authentication tokens
      tokenKeyPair:
        secretRef: mds-token

      # Provider configuration - OAuth for service accounts AND SSO for browser logins
      provider:
        # OAuth provider for service-to-service authentication (client credentials flow)
        oauth:
          configurations:
            jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
            expectedIssuer: http://keycloak.flink-demo-rbac.confluentdemo.local:8080/realms/confluent
            subClaimName: client_id

        # SSO/OIDC configuration for browser-based authentication (authorization code flow)
        # Used by Control Center for user login
        sso:
          enabled: true
          clientCredentials:
            secretRef: oidc-client-credentials
          configurations:
            groupsClaimName: groups
            subClaimName: email
            # Issuer must match external HTTPS URL (JWT token claim validation)
            issuer: https://keycloak.flink-demo-rbac.confluentdemo.local/realms/confluent
            # Browser redirects use external HTTPS
            authorizeBaseEndpointUri: https://keycloak.flink-demo-rbac.confluentdemo.local/realms/confluent/protocol/openid-connect/auth
            # Server-side calls use internal HTTP (no TLS)
            jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
            tokenBaseEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
            refreshToken: false
            sessionTokenExpiry: 900000      # 15 minutes
            sessionMaxTimeout: 21600000     # 6 hours

      # Impersonation settings for RBAC
      impersonation:
        admins:
          - User:kafka
          - User:krp                        # Kafka REST Proxy principal
          - User:cmf                        # CMF service principal for user authorization
          - User:admin@osow.ski             # Admin user from Keycloak
        protectedUsers:
          - User:mds
          - User:superadmin

  # ==============================================================================
  # DEPENDENCIES - KRaft controller and Kafka REST authentication
  # ==============================================================================
  dependencies:
    # Broker-to-KRaft controller OAuth authentication
    kRaftController:
      controllerListener:
        authentication:
          type: oauth
          jaasConfig:
            secretRef: kafka-oauth-client
          oauthSettings:
            tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
      clusterRef:
        name: kraftcontroller

    # Kafka REST (MDS) OAuth authentication
    kafkaRest:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: kafka-oauth-client
        oauthSettings:
          tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
          expectedIssuer: http://keycloak.flink-demo-rbac.confluentdemo.local:8080/realms/confluent
          jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
          subClaimName: client_id

  # ==============================================================================
  # JVM CONFIGURATION - OAuth SASL mechanism
  # ==============================================================================
  configOverrides:
    jvm:
      # OAuth login callback handler
      - "-Dorg.apache.kafka.sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler"
      - "-Dsasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler"
      # OAuth allowed URLs (internal HTTP and external HTTPS Keycloak endpoints)
      - "-Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent,http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs,http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token,https://keycloak.flink-demo-rbac.confluentdemo.local/realms/confluent,https://keycloak.flink-demo-rbac.confluentdemo.local/realms/confluent/protocol/openid-connect/certs,https://keycloak.flink-demo-rbac.confluentdemo.local/realms/confluent/protocol/openid-connect/token,https://keycloak.flink-demo-rbac.confluentdemo.local/realms/confluent/protocol/openid-connect/auth/device"
      # JWKS endpoint refresh interval
      - "-Dorg.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler.JWKS_ENDPOINT_REFRESH_MS=3600000"

    # ==============================================================================
    # SERVER CONFIGURATION - MDS SSO device grant flow for CLI authentication
    # ==============================================================================
    server:
      # Enable CLI SSO using OAuth device grant flow (for confluent login)
      # Uses external HTTPS URL for user-facing browser redirects
      - confluent.oidc.idp.device.authorization.endpoint.uri=https://keycloak.flink-demo-rbac.confluentdemo.local/realms/confluent/protocol/openid-connect/auth/device
