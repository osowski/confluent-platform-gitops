# KafkaTopic resources for group-based RBAC demonstration
# Topics follow naming convention: <group>-* for RBAC enforcement
---
# Shapes group topics
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: shapes-input
  namespace: kafka
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
    retention.ms: "172800000"  # 2 days
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: shapes-output
  namespace: kafka
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
    retention.ms: "172800000"  # 2 days
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: shapes-state
  namespace: kafka
spec:
  replicas: 3
  partitionCount: 3
  configs:
    cleanup.policy: "compact"
    min.compaction.lag.ms: "0"
---
# Colors group topics
