# OIDC Client Credentials Secret
# Contains client ID and secret for Control Center browser SSO authentication
# This is used by MDS to authenticate with Keycloak for the authorization code flow
apiVersion: v1
kind: Secret
metadata:
  name: oidc-client-credentials
  namespace: kafka
type: Opaque
stringData:
  oidcClientSecret.txt: |
    clientId=controlcenter
    clientSecret=controlcenter-secret
