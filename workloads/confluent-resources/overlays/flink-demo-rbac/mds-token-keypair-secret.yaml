# MDS Token Keypair Secret
# RSA key pair for signing/validating MDS authentication tokens
#
# IMPORTANT: This uses placeholder values for demonstration.
# In production, generate a proper RSA keypair using:
#   openssl genrsa -out mds-tokenkeypair.txt 2048
#   openssl rsa -in mds-tokenkeypair.txt -outform PEM -pubout -out mds-publickey.txt
#
# Then create the secret with:
#   kubectl create secret generic mds-token \
#     --from-file=mdsPublicKey.pem=mds-publickey.txt \
#     --from-file=mdsTokenKeyPair.pem=mds-tokenkeypair.txt \
#     --namespace kafka
apiVersion: v1
kind: Secret
metadata:
  name: mds-token
  namespace: kafka
type: Opaque
stringData:
  # Public key (placeholder - replace with actual key)
  mdsPublicKey.pem: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_ACTUAL_PUBLIC_KEY
    -----END PUBLIC KEY-----
  # Private key (placeholder - replace with actual key)
  mdsTokenKeyPair.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_ACTUAL_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----
