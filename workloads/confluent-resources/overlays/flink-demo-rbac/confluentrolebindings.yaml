---
# Shapes group - DeveloperManage on shapes-env FlinkEnvironment resource
apiVersion: platform.confluent.io/v1beta1
kind: ConfluentRolebinding
metadata:
  name: shapes-developermanage-env
  namespace: kafka
spec:
  principal:
    type: group
    name: shapes
  role: DeveloperManage
  clustersScopeByIds:
    cmfId: CMF-id
  resourcePatterns:
