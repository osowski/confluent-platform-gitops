# Control Center OIDC SSO Configuration Patch
# Enables browser-based authentication via Keycloak OIDC
apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter
  namespace: kafka
spec:
  configOverrides:
    server:
      # OIDC Client Configuration
      - confluent.controlcenter.auth.oidc.client.id=controlcenter
      - confluent.controlcenter.auth.oidc.client.secret=controlcenter-secret

      # OIDC Provider URLs
      # Browser redirects use external URL
      - confluent.controlcenter.auth.oidc.issuer.url=http://keycloak.flink-demo-rbac.confluentdemo.local:30080/realms/confluent
      - confluent.controlcenter.auth.oidc.authorization.endpoint=http://keycloak.flink-demo-rbac.confluentdemo.local:30080/realms/confluent/protocol/openid-connect/auth
      # Server-side token exchange uses internal DNS
      - confluent.controlcenter.auth.oidc.token.endpoint=http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
      - confluent.controlcenter.auth.oidc.jwks.url=http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs

      # OIDC Claims
      - confluent.controlcenter.auth.oidc.groups.claim=groups

      # Session timeout (2 hours)
      - confluent.controlcenter.auth.session.timeout.ms=7200000
