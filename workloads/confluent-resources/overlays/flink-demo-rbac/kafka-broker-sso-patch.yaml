# Kafka Broker SSO Configuration Patch
# Adds OIDC SSO provider configuration for browser-based authentication
# This works alongside the existing OAuth provider for service-to-service auth
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: kafka
spec:
  services:
    mds:
      provider:
        # SSO/OIDC configuration for browser-based authentication (authorization code flow)
        # Note: This is in addition to the existing OAuth provider (client credentials flow)
        sso:
          clientCredentials:
            # Secret containing OIDC client ID and secret for Control Center SSO
            secretRef: oidc-client-credentials
          configurations:
            # Groups claim name in ID token
            groupsClaimName: groups
            # Subject claim name in ID token
            subClaimName: sub
            # Issuer URL - must match external URL for browser redirects (HTTPS via IngressRoute)
            issuer: https://keycloak.flink-demo-rbac.confluentdemo.local/realms/confluent
            # JWKS endpoint - uses internal DNS for server-side validation
            jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
            # Authorization endpoint - external URL for browser redirects (HTTPS via IngressRoute)
            authorizeBaseEndpointUri: https://keycloak.flink-demo-rbac.confluentdemo.local/realms/confluent/protocol/openid-connect/auth
            # Token endpoint - internal DNS for server-side token exchange
            tokenBaseEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
            # Enable refresh tokens for session renewal
            refreshToken: true
            # Session token expiry (15 minutes)
            sessionTokenExpiry: 900000
            # Maximum session timeout (6 hours)
            sessionMaxTimeout: 21600000
