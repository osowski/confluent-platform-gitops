# KRaft Controller OAuth/RBAC Configuration Patch
# Enables OAuth authentication and RBAC authorization for KRaft controllers
# NOTE: RBAC requires MDS access for permission validation
# Controllers connect to broker MDS endpoint (not circular - different dependency type)
# TODO: Issue #72 - Switch from OAuth to mTLS authentication when TLS is implemented
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: kafka
spec:
  # Controller listener authentication - OAuth for controller quorum communication
  listeners:
    controller:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: kraft-oauth-client
        oauthSettings:
          tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
          expectedIssuer: http://keycloak.flink-demo-rbac.confluentdemo.local:30080/realms/confluent
          jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
          subClaimName: client_id

  # Enable RBAC authorization with superusers for control plane operations
  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:kraftcontroller
      - User:admin@osow.ski

  # MDS dependency - required for RBAC permission validation
  dependencies:
    mdsKafkaCluster:
      bootstrapEndpoint: kafka.kafka.svc.cluster.local:9073
      authentication:
        type: oauth
        jaasConfig:
          secretRef: kraft-oauth-client
        oauthSettings:
          tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token

  # JVM configuration for OAuth SASL mechanism
  configOverrides:
    jvm:
      # OAuth login callback handler
      - "-Dorg.apache.kafka.sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler"
      - "-Dsasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler"
      # OAuth allowed URLs (internal and external Keycloak endpoints)
      - "-Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent,http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs,http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token,http://keycloak.flink-demo-rbac.confluentdemo.local:30080/realms/confluent,http://keycloak.flink-demo-rbac.confluentdemo.local:30080/realms/confluent/protocol/openid-connect/certs,http://keycloak.flink-demo-rbac.confluentdemo.local:30080/realms/confluent/protocol/openid-connect/token"
