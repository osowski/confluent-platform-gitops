---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-cmf
  namespace: operator
  annotations:
    argocd.argoproj.io/sync-wave: "116"
type: Opaque
stringData:
  # Must equal the cmf-ui client secret in the Keycloak realm (Task 1)
  client-secret: cmf-ui-secret
  # 32-byte cookie secret (base64 of a 32-byte string). Demo value; rotate for real use.
  # Decodes to "0123456789abcdef0123456789abcdef" (exactly 32 bytes — oauth2-proxy requires 16/24/32).
  cookie-secret: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
