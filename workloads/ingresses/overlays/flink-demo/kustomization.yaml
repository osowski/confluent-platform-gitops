---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cluster-specific IngressRoutes for flink-demo
resources:
- cmf-ingressroute.yaml
- controlcenter-ingressroute.yaml
- controlcenter-certificate.yaml

# Cluster-specific labels
labels:
- includeSelectors: false
  includeTemplates: true
  pairs:
    cluster: flink-demo
