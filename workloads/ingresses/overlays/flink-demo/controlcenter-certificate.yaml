---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: controlcenter-tls
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "110"
spec:
  dnsNames:
    - controlcenter.flink-demo.confluentdemo.local
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: selfsigned-cluster-issuer
  secretName: controlcenter-tls
  usages:
    - digital signature
    - key encipherment
