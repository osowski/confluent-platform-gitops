---
# Delegates auth to oauth2-proxy; copies the Bearer token onto the upstream request.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cmf-oauth-auth
  namespace: operator
spec:
  forwardAuth:
    address: http://oauth2-proxy-cmf.operator.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - Authorization
      - X-Auth-Request-User
      - X-Auth-Request-Email
---
# On 401 from the auth check, redirect the browser to the oauth2-proxy sign-in.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cmf-oauth-errors
  namespace: operator
spec:
  errors:
    status:
      - "401"
    service:
      name: oauth2-proxy-cmf
      port: 4180
    query: "/oauth2/sign_in?rd={url}"
