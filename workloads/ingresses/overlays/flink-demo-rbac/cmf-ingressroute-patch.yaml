---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cmf
  namespace: operator
spec:
  entryPoints:
    - websecure
  routes:
    # All CMF traffic flows through oauth2-proxy (reverse-proxy mode): it does
    # the Keycloak login (auto-redirect) and proxies authenticated requests to
    # cmf-service with the bearer token injected. The /oauth2/* login+callback
    # endpoints are served by oauth2-proxy itself.
    - match: Host(`cmf.flink-demo-rbac.confluentdemo.local`)
      kind: Rule
      services:
        - name: oauth2-proxy-cmf
          port: 4180
  tls:
    secretName: cmf-tls
