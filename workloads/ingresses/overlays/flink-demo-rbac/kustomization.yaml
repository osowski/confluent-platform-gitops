---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cluster-specific IngressRoutes for flink-demo-rbac
resources:
  - controlcenter-ingressroute.yaml
  - mds-ingressroute.yaml
  - cmf-ingressroute.yaml

# Cluster-specific labels
labels:
- includeSelectors: false
  includeTemplates: true
  pairs:
    cluster: flink-demo-rbac
