---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cmf-tls
  namespace: operator
spec:
  secretName: cmf-tls
  dnsNames:
    - cmf.eks-demo.platform.dspdemos.com
    - cmf-ui.eks-demo.platform.dspdemos.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod
