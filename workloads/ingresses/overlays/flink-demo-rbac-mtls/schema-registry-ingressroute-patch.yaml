---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: schema-registry
  namespace: kafka
spec:
  routes:
    - kind: Rule
      match: Host(`schema-registry.flink-demo-rbac-mtls.confluentdemo.local`)
      services:
        - name: schemaregistry
          port: 8081
          # SR serves HTTPS (#275); Traefik connects over TLS to the backend
          # via the schemaregistry-tls ServersTransport.
          scheme: https
          serversTransport: schemaregistry-tls
