---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-pull
  namespace: flink
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      name: ollama-model-pull
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-ollama
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for Ollama API to be ready..."
          until wget -q -O /dev/null http://ollama:11434/; do
            echo "Ollama not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Ollama is ready!"
      containers:
      - name: pull-model
        image: ollama/ollama:0.20.6
        command:
        - /bin/sh
        - -c
        - |
          export OLLAMA_HOST=http://ollama:11434
          echo "Starting model pulls..."
          while IFS= read -r MODEL || [ -n "${MODEL}" ]; do
            MODEL=$(echo "${MODEL}" | tr -d '[:space:]')
            [ -z "${MODEL}" ] && continue
            echo "Pulling model: ${MODEL}"
            ollama pull "${MODEL}"
            echo "Done pulling: ${MODEL}"
          done < /config/models
          echo "All models pulled successfully!"
        volumeMounts:
        - name: model-config
          mountPath: /config
      volumes:
      - name: model-config
        configMap:
          name: ollama-model-config
          items:
          - key: models
            path: models
