---
# OAuth credentials for shapes producer
# Service account: sa-shapes-producer (created in Keycloak via Job)
apiVersion: v1
kind: Secret
metadata:
  name: shapes-producer-oauth
  namespace: flink-shapes
type: Opaque
stringData:
  client-id: sa-shapes-producer
  client-secret: sa-shapes-producer-secret
---
# OAuth credentials for colors producer
# Service account: sa-colors-producer (created in Keycloak via Job)
apiVersion: v1
kind: Secret
metadata:
  name: colors-producer-oauth
  namespace: flink-colors
type: Opaque
stringData:
  client-id: sa-colors-producer
  client-secret: sa-colors-producer-secret
