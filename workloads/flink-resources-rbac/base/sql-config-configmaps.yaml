# ConfigMaps containing Flink SQL Database and ComputePool definitions
# These are applied via Jobs that call the CMF API
# NOTE: Catalog definitions are built dynamically in the sql-init jobs
# to embed a fresh STATIC_TOKEN for Schema Registry authentication.
# CMF 2.2 does not support OAUTHBEARER as a bearer.auth.credentials.source
# in its embedded SR client, so catalogs use STATIC_TOKEN with runtime
# token generation instead of connectionSecretId with CMF Secrets.
---
# Shapes Database - References Kafka cluster
apiVersion: v1
kind: ConfigMap
metadata:
  name: shapes-database-config
  namespace: flink-shapes
data:
  database.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "KafkaDatabase",
      "metadata": {
        "name": "shapes-database"
      },
      "spec": {
        "kafkaCluster": {
          "connectionConfig": {
            "bootstrap.servers": "kafka.kafka.svc.cluster.local:9071"
          },
          "connectionSecretId": "kafka-conn-secret-id-shapes"
        },
        "ddlEnvironments": [
          "shapes-env"
        ]
      }
    }
---
# Shapes Compute Pool - Dedicated compute resources for shapes-env
apiVersion: v1
kind: ConfigMap
metadata:
  name: shapes-pool-config
  namespace: flink-shapes
data:
  compute-pool.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "ComputePool",
      "metadata": {
        "name": "shapes-pool"
      },
      "spec": {
        "type": "DEDICATED",
        "clusterSpec": {
          "flinkVersion": "v1_19",
          "image": "confluentinc/cp-flink-sql:1.19-cp8",
          "flinkConfiguration": {
            "taskmanager.numberOfTaskSlots": "2",
            "metrics.reporter.prom.factory.class": "org.apache.flink.metrics.prometheus.PrometheusReporterFactory",
            "metrics.reporter.prom.port": "9249-9250",
            "pipeline.operator-chaining.enabled": "false",
            "execution.checkpointing.interval": "10s",
            "state.checkpoints.dir": "s3://warehouse/checkpoints/shapes/",
            "state.savepoints.dir": "s3://warehouse/savepoints/shapes/",
            "s3.endpoint": "http://minio.storage.svc.cluster.local:9000",
            "s3.path.style.access": "true",
            "s3.connection.ssl.enabled": "false",
            "state.backend": "filesystem",
            "state.checkpoints.timeout": "600000",
            "execution.checkpointing.min-pause": "5000",
            "execution.checkpointing.max-concurrent-checkpoints": "1",
            "high-availability.type": "kubernetes",
            "high-availability.storageDir": "s3://warehouse/ha/shapes/",
            "state.checkpoints.num-retained": "10",
            "env.java.opts.all": "-Dorg.apache.flink.kafka.shaded.org.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token"
          },
          "podTemplate": {
            "spec": {
              "restartPolicy": "Always",
              "terminationGracePeriodSeconds": 30,
              "containers": [
                {
                  "name": "flink-main-container",
                  "imagePullPolicy": "IfNotPresent",
                  "securityContext": {
                    "runAsUser": 9999
                  },
                  "env": [
                    {
                      "name": "AWS_ACCESS_KEY_ID",
                      "valueFrom": {
                        "secretKeyRef": {
                          "name": "minio-credentials",
                          "key": "root-user"
                        }
                      }
                    },
                    {
                      "name": "AWS_SECRET_ACCESS_KEY",
                      "valueFrom": {
                        "secretKeyRef": {
                          "name": "minio-credentials",
                          "key": "root-password"
                        }
                      }
                    }
                  ]
                }
              ]
            }
          },
          "taskManager": {
            "resource": {
              "cpu": 1.0,
              "memory": "1700m"
            }
          },
          "jobManager": {
            "resource": {
              "cpu": 1,
              "memory": "1700m"
            }
          }
        }
      }
    }
---
# Shapes Flink SQL Statement
# Continuous INSERT INTO enrichment: reads the existing shapes-input topic (shared with the
# JAR FlinkApplication) and writes enriched records to the dedicated shapes-sql-output topic.
# Adds an 'encoded' column mirroring the JAR job; error/original are NULL on the happy path.
# An explicit column list is used so the inferred sink's leading raw `key` (BYTES) column is
# left NULL. SQL functions target Flink 1.19 (cp-flink-sql:1.19-cp8) — validate at deploy.
apiVersion: v1
kind: ConfigMap
metadata:
  name: shapes-statement-config
  namespace: flink-shapes
data:
  statement.json: |
    {
      "apiVersion": "cmf.confluent.io/v1",
      "kind": "Statement",
      "metadata": {
        "name": "shapes-sql-enrich"
      },
      "spec": {
        "statement": "INSERT INTO `shapes-sql-output` /*+ OPTIONS('kafka.producer.transaction.timeout.ms' = '900000') */ (`timestamp`, `type`, `location`, `value`, `status`, `id`, `encoded`, `error`, `original`) SELECT `timestamp`, `type`, `location`, `value`, `status`, `id`, TO_BASE64(ENCODE(CONCAT(`type`, '-', `location`), 'UTF-8')) AS `encoded`, CAST(NULL AS STRING) AS `error`, CAST(NULL AS STRING) AS `original` FROM `shapes-input` /*+ OPTIONS('properties.group.id' = 'shapes-sql-enrich') */;",
        "properties": {
          "sql.current-catalog": "shapes-catalog",
          "sql.current-database": "shapes-database"
        },
        "computePoolName": "shapes-pool",
        "parallelism": 1,
        "stopped": false
      }
    }
---
