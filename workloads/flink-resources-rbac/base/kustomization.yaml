apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pull in shared Flink infrastructure (CMFRestClass, Service, ServiceMonitor, Grafana dashboard)
# The base example FlinkEnvironment/FlinkApplication are deleted below.
resources:
  - ../../flink-resources/base
  - cfk-oauth-secret.yaml
  - keycloak-service-account-job.yaml
  - flink-oauth-secrets.yaml
  - flink-environment-shapes.yaml
  - flink-environment-colors.yaml
  - flink-application-shapes.yaml
  - flink-application-colors.yaml
  - sql-config-configmaps.yaml
  - cmf-secret-configmaps.yaml
  - sql-init-jobs.yaml
  - producer-oauth-secrets.yaml
  - producers.yaml
  - topics.yaml
  - schemas.yaml

patches:
  - path: cmfrestclass-oauth-patch.yaml
    target:
      kind: CMFRestClass
      name: cmf-rest-class

  # Remove base example resources — group environments and applications managed above
  - patch: |-
      $patch: delete
      apiVersion: platform.confluent.io/v1beta1
      kind: FlinkApplication
      metadata:
        name: default-flink-app
        namespace: flink

  - patch: |-
      $patch: delete
      apiVersion: platform.confluent.io/v1beta1
      kind: FlinkEnvironment
      metadata:
        name: env1
        namespace: flink
