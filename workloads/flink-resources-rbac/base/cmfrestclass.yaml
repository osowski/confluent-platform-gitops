# REFERENCE: https://docs.confluent.io/operator/current/co-manage-flink.html#create-a-cmf-rest-class
apiVersion: platform.confluent.io/v1beta1
kind: CMFRestClass
metadata:
  name: cmf-rest-class
  namespace: flink
spec:
  cmfRest:
    # CMF service endpoint
    # CMF is deployed in the operator namespace
    endpoint: http://cmf-service.operator.svc.cluster.local:80

    # OAuth authentication for CFK operator to CMF communication
    # This is operator-level authentication, not end-user authentication
    # CFK uses client credentials flow to obtain tokens from Keycloak
    authentication:
      type: oauth
      oauth:
        # Secret containing client credentials (clientId/clientSecret)
        # CFK uses these to obtain OAuth tokens from Keycloak
        secretRef: cfk-cmf-oauth-client
        # OAuth token endpoint configuration
        # CFK will call this endpoint to exchange client credentials for access tokens
        configuration:
          tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
          subClaimName: client_id