# Confluent for Kubernetes (CFK) Operator Configuration
# Base values for operator deployment

# Namespace-scoped mode for security
namespaced: true

# Pod configuration
podLabels:
  app.kubernetes.io/name: confluent-operator
  app.kubernetes.io/component: operator

# Replica configuration for homelab (single replica)
replicaCount: 1

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Enable debug logging (can be overridden per cluster)
debug: false

# Kubernetes RBAC
rbac:
  create: true

# Service account
serviceAccount:
  create: true
  name: confluent-operator

# Image configuration
image:
  repository: confluentinc/confluent-operator
  pullPolicy: IfNotPresent
  # Tag defaults to chart appVersion

# Operator watches only the kafka namespace where Confluent Platform CRs are deployed
namespaceList:
  - flink
  - kafka
  - operator

# Flink SQL controllers (RFC 68, preview — CFK 3.3.0+)
# Registers the FlinkComputePool / FlinkKafkaCatalog / FlinkKafkaDatabase /
# FlinkStatement / FlinkSecret / FlinkEnvironmentSecretMapping controllers so
# CMF Flink SQL objects can be managed declaratively via CRDs. CRDs are always
# installed by the chart; this flag activates the controllers. The CFK 2.10
# controllers (CMFRestClass, FlinkEnvironment, FlinkApplication) stay on via
# enableCMFDay2Ops (default true) and are not gated by this flag.
enableFlinkSQL: true
