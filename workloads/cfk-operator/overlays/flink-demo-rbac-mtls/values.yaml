# Confluent for Kubernetes - flink-demo-rbac-mtls Cluster Overlay
# Cluster-specific configuration overrides

# Additional pod annotations for flink-demo-rbac-mtls cluster identification
podAnnotations:
  cluster: flink-demo-rbac-mtls

# Watch additional namespaces for group-based Flink resources
namespaceList:
  - flink
  - flink-shapes
  - flink-colors
  - kafka
  - operator
