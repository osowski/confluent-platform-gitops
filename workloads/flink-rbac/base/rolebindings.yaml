# RoleBinding for shapes group in flink-shapes namespace - Full permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shapes-group-flink-developer
  namespace: flink-shapes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-developer
