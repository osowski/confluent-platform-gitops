---
# Read-only role in kafka namespace for Flink developers
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-reader
  namespace: kafka
rules:
  # Read access to all Confluent Platform resources
  - apiGroups:
      - platform.confluent.io
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch

  # Read access to core resources
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - events
    verbs:
      - get
      - list
      - watch

  # Read access to apps resources
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
    verbs:
      - get
      - list
      - watch
