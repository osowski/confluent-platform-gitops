---
# Role for Flink developers in flink-shapes namespace - Full permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-developer
  namespace: flink-shapes
rules:
  # Full access to all Flink Kubernetes Operator resources
  - apiGroups:
      - flink.apache.org
    resources:
      - "*"
    verbs:
      - "*"

  # Full access to CFK Flink resources (FlinkEnvironment, FlinkApplication, CMFRestClass)
  - apiGroups:
      - platform.confluent.io
    resources:
      - flinkenvironments
      - flinkenvironments/status
      - flinkapplications
      - flinkapplications/status
      - cmfrestclasses
      - cmfrestclasses/status
    verbs:
      - "*"

  # Full access to core Kubernetes resources in this namespace
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - pods/exec
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
      - events
    verbs:
      - "*"

  # Full access to apps resources
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - replicasets
    verbs:
      - "*"

  # Full access to batch resources
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - "*"
