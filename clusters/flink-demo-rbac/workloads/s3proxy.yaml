---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: s3proxy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "115"
spec:
  project: default
  source:
    repoURL: https://github.com/osowski/confluent-platform-gitops.git
    targetRevision: HEAD
    path: workloads/s3proxy/overlays/flink-demo-rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: flink
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
