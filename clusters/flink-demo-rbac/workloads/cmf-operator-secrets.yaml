apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cmf-operator-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "117" # Deploy before cmf-operator at wave 118
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://github.com/osowski/confluent-platform-gitops.git
    targetRevision: v0.7.0
    path: workloads/cmf-operator/overlays/flink-demo-rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=false # operator namespace already exists
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
