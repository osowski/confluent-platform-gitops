---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: registry-hosts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "86" # After registry (85)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/osowski/confluent-platform-gitops.git
    targetRevision: v0.8.0
    path: infrastructure/registry-hosts/overlays/flink-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: registry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
