kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# containerd reads per-registry hosts.toml from /etc/containerd/certs.d
# (written by infrastructure/registry-hosts). Set at create time so no
# containerd restart is needed; inert until certs.d files exist.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Traefik HTTP/HTTPS
      - containerPort: 30000
        hostPort: 80
        protocol: TCP
      - containerPort: 30001
        hostPort: 443
        protocol: TCP
      # Kafka Bootstrap
      - containerPort: 31000
        hostPort: 31000
        protocol: TCP
      # Kafka Broker 0
      - containerPort: 31001
        hostPort: 31001
        protocol: TCP
      # Kafka Broker 1
      - containerPort: 31002
        hostPort: 31002
        protocol: TCP
      # Kafka Broker 2
      - containerPort: 31003
        hostPort: 31003
        protocol: TCP
  - role: worker
  - role: worker
  - role: worker
