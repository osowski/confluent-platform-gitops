kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Tell each node's containerd to read per-registry config (hosts.toml) from
# /etc/containerd/certs.d at startup. Set at create time so no containerd
# restart is ever needed to register the in-cluster image registry later
# (see infrastructure/registry and infrastructure/registry-hosts).
# Inert on its own: no effect until files exist under certs.d.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Traefik HTTP/HTTPS
      - containerPort: 30000
        hostPort: 80
        protocol: TCP
      - containerPort: 30001
        hostPort: 443
        protocol: TCP
      # Kafka Bootstrap
      - containerPort: 31000
        hostPort: 31000
        protocol: TCP
      # Kafka Broker 0
      - containerPort: 31001
        hostPort: 31001
        protocol: TCP
      # Kafka Broker 1
      - containerPort: 31002
        hostPort: 31002
        protocol: TCP
      # Kafka Broker 2
      - containerPort: 31003
        hostPort: 31003
        protocol: TCP
  - role: worker
  - role: worker
  - role: worker
