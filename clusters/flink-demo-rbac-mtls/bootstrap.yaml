---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/osowski/confluent-platform-gitops.git
    # TEMP(test-only): pinned to feature branch for pre-merge live verification.
    # REVERT to HEAD before merging PR for #272.
    targetRevision: feature-272/flink-demo-rbac-mtls-pki
    path: bootstrap
    helm:
      valuesObject:
        cluster:
          name: flink-demo-rbac-mtls
          domain: confluentdemo.local
        git:
          # TEMP(test-only): pinned to feature branch; REVERT to "HEAD" before merge.
          targetRevision: "feature-272/flink-demo-rbac-mtls-pki"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
