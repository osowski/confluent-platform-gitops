---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mds-keygen
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "106" # After cfk-operator (105), before confluent-resources (110)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://github.com/osowski/confluent-platform-gitops.git
    targetRevision: v0.7.0
    path: workloads/mds-keygen/overlays/eks-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
