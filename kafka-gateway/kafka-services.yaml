---
# Headless service for Gateway bootstrap endpoint
# This allows DNS resolution to all Kafka pods
apiVersion: v1
kind: Service
metadata:
  name: kafka-gateway-bootstrap
  namespace: kafka
  labels:
    app: kafka
    service-type: gateway-bootstrap
spec:
  clusterIP: None  # Headless service
  ports:
    - name: kafka-gateway
      port: 9092
      targetPort: 9092
      protocol: TCP
  selector:
    app: kafka
    clusterId: kafka
    confluent-platform: "true"
    type: kafka
---
# Individual service for kafka-0 on port 9093
apiVersion: v1
kind: Service
metadata:
  name: kafka-gateway-0
  namespace: kafka
  labels:
    app: kafka
    service-type: gateway-broker
    broker-id: "0"
spec:
  type: ClusterIP
  ports:
    - name: kafka-gateway
      port: 9093
      targetPort: 9092
      protocol: TCP
  selector:
    app: kafka
    clusterId: kafka
    confluent-platform: "true"
    type: kafka
    statefulset.kubernetes.io/pod-name: kafka-0
---
