---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cluster-specific IngressRoutes and Certificates for flink-demo infrastructure ingresses
resources:
  - argocd-ingressroute.yaml
  - argocd-certificate.yaml
  - argocd-serverstransport.yaml
  - vault-ingressroute.yaml
  - vault-certificate.yaml

# Cluster-specific labels
labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      cluster: flink-demo
