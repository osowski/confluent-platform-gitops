---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-server-tls
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "80"
spec:
  dnsNames:
    - vault.flink-demo.confluentdemo.local
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: selfsigned-cluster-issuer
  secretName: vault-server-tls
  usages:
    - digital signature
    - key encipherment
