---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "80"
spec:
  dnsNames:
    - argocd.flink-demo-rbac.confluentdemo.local
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: selfsigned-cluster-issuer
  secretName: argocd-server-tls
  usages:
    - digital signature
    - key encipherment
