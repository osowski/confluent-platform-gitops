# eks-demo OIDC SSO overlay.
# DEMO: client secret supplied inline; the chart renders it into the `oidc` Secret.
# In production, use config.oidc.externalSecret (enabled + name) referencing a Secret
# (OIDC_CLIENT_ID / OIDC_CLIENT_SECRET / OIDC_ISSUER_URL / OIDC_SCOPES / OIDC_CALLBACK_URL)
# sourced from a secrets manager.
config:
  # OIDC gates UI login; all API calls use the cluster-admin service account.
  unsafeUseServiceAccountToken: true
  oidc:
    clientID: headlamp
    clientSecret: headlamp-secret
    issuerURL: https://keycloak.eks-demo.platform.dspdemos.com/realms/confluent
    scopes: "openid profile email"
    callbackURL: https://headlamp.eks-demo.platform.dspdemos.com/oidc-callback
