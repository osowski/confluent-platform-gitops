# Headlamp base values — token-based login on all clusters.
# Per-cluster overlays are optional (none currently). See docs/architecture.md
# and adrs/0009 for the auth model and the deferred-SSO follow-up.
config:
  inCluster: true

# The cluster-admin binding backs the documented access UX (mint a token with
# `kubectl -n headlamp create token headlamp` and paste it at login). Headlamp
# forwards that pasted token for API calls, but it still needs its OWN mounted
# ServiceAccount token to build the in-cluster API client (rest.InClusterConfig
# reads /var/run/secrets/.../token + ca.crt) — disabling automount breaks the
# in-cluster context ("failed to get in-cluster context"). The token mount must
# therefore stay enabled. Scoping this SA to a read-only role (or fronting
# Headlamp with an auth proxy) is tracked in the SSO follow-up.
clusterRoleBinding:
  create: true
  clusterRoleName: cluster-admin

# ClusterIP service; ingress is provided by infrastructure/ingresses (Traefik).
service:
  type: ClusterIP
  port: 80
