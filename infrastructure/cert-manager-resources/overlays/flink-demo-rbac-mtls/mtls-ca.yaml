---
# Root CA certificate, signed by the cluster's existing self-signed issuer.
# Stored as a Secret in cert-manager namespace; consumed by the CA ClusterIssuer below.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rbac-mtls-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  isCA: true
  commonName: flink-demo-rbac-mtls-ca
  secretName: rbac-mtls-ca
  duration: 87600h    # 10 years
  renewBefore: 720h   # 30 days
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA-type ClusterIssuer that signs all mTLS leaf certs from the root CA above.
# Cluster-scoped: any namespace can request certs without secret syncing.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: rbac-mtls-ca-issuer
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  ca:
    secretName: rbac-mtls-ca
