---
# Distributes the root CA public cert as a ConfigMap into target namespaces,
# so every Confluent component can trust mTLS peers. Re-syncs on CA rotation.
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: rbac-mtls-ca-bundle
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  sources:
    # ca.crt is the conventional trust-anchor key and stays correct if the root
    # CA later becomes intermediate-signed (see mTLS design future-migration note).
    - secret:
        name: rbac-mtls-ca
        key: ca.crt
  target:
    configMap:
      key: ca.crt
    # Select participating namespaces by purpose label so extending the mTLS
    # trust mesh to flink/operator is a one-line namespace-label change.
    namespaceSelector:
      matchLabels:
        mtls-trust: enabled
