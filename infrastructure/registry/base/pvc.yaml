---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
  labels:
    app: registry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Sized for several CI-built images including large Flink base layers
      # (confluentinc/cp-flink is ~2GB+ compressed per base version)
      storage: 20Gi
