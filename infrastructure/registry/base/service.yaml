---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  # Pinned ClusterIP in kind's default service CIDR (10.96.0.0/16): the one
  # address reachable identically from pods and node containerd (kube-proxy
  # DNAT), since kind nodes cannot resolve cluster DNS. Must match
  # infrastructure/registry-hosts.
  clusterIP: 10.96.0.50
  selector:
    app: registry
  ports:
    - name: http
      port: 5000
      targetPort: http
