---
# Holds the registry address consumed by the registry-hosts Job, and — just as
# important — gives this Application a non-hook resource. An ArgoCD app whose
# only resources are hooks is trivially Synced and its automated sync (and
# therefore the PostSync hook) never fires; this ConfigMap is what triggers
# the initial sync that runs the Job.
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-hosts-config
  namespace: registry
data:
  # Must match the pinned ClusterIP of the registry Service
  # (infrastructure/registry/base/service.yaml)
  REGISTRY_ADDR: "10.96.0.50:5000"
