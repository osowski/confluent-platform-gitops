---
# completions/parallelism = flink-demo node count (1 control-plane + 3
# workers). MUST stay in sync with the node topology declared in
# clusters/flink-demo/kind-config.yaml so the podAntiAffinity lands exactly
# one pod per node.
apiVersion: batch/v1
kind: Job
metadata:
  name: registry-hosts
spec:
  completions: 4
  parallelism: 4
